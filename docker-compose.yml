# AuthGate — One-command local development
#   docker compose up
#
# Starts:
#   - AuthGate on :8000 (all 10 endpoints)
#   - LocalStack on :4566 (S3 + DynamoDB mock)
#
# AWS resources are auto-created on first startup (see init-localstack).
# All data is ephemeral — restart = clean slate. For persistent data,
# use real AWS credentials in config.toml.
#
# Requires: Docker, docker compose v2

services:
  authgate:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=us-east-1
      - AWS_ENDPOINT_URL_S3=http://localstack:4566
      - AWS_ENDPOINT_URL_DYNAMODB=http://localstack:4566
      - LOG_LEVEL=DEBUG
    depends_on:
      localstack-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,dynamodb,sts
      - DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  localstack-init:
    image: amazon/aws-cli
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=us-east-1
    entrypoint:
      - sh
      - -c
      - |
        echo "Creating S3 bucket..."
        aws --endpoint-url=http://localstack:4566 s3 mb s3://authgate-keys 2>/dev/null || true
        echo "Creating DynamoDB table..."
        aws --endpoint-url=http://localstack:4566 dynamodb create-table \
          --table-name Users \
          --attribute-definitions AttributeName=username,AttributeType=S \
          --key-schema AttributeName=username,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST 2>/dev/null || true
        echo "LocalStack ready."
